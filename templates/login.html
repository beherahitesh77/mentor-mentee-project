<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">Mentor Mentee System</div>

<div class="center">
    <div class="card">
        <h2>Sign In</h2>

        <form method="POST">
            <input name="name" placeholder="Enter Name">

            <select name="role">
                <option value="mentor">Mentor</option>
                <option value="mentee">Mentee</option>
            </select>

            <button type="submit">Login</button>
        </form>
    </div>
</div>

</body>
</html>
